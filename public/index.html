<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客服冷静演绎工作台</title>
    <link rel="icon" type="image/gif" href="/my-icon.gif">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-secondary: #64748b;
            --radius: 14px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.1);
            --category-font-size: 17px;
            --category-active-bg: #eff6ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 24px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .tabs {
            display: flex;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            gap: 4px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 16px 24px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }

            .tab-btn:hover {
                color: var(--text);
                background: rgba(37,99,235,0.04);
            }

            .tab-btn.active {
                color: var(--primary);
                border-bottom-color: var(--primary);
                font-weight: 600;
            }

        .tab-content {
            display: none;
            padding: 28px;
            animation: fadeIn 0.2s;
        }

            .tab-content.active {
                display: block;
            }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        label {
            font-weight: 500;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
        }

        select, input, textarea, button {
            font-family: inherit;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

            button:hover {
                background: var(--primary-hover);
                transform: translateY(-1px);
                box-shadow: var(--shadow);
            }

            button.secondary {
                background: #64748b;
            }

                button.secondary:hover {
                    background: #475569;
                }

        .flex-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            background: #f8fafc;
            resize: vertical;
        }

            textarea:focus, input:focus, select:focus {
                outline: none;
                border-color: var(--primary);
                box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
            }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
        }

        .badge {
            background: rgba(37,99,235,0.1);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15,23,42,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
        }

        .modal-content {
            background: var(--surface);
            margin: 40px auto;
            padding: 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.2s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 图文攻略分类设计 */
        .guide-container {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 24px;
            margin-top: 20px;
        }

        .category-sidebar {
            background: #f8fafc;
            border-radius: var(--radius);
            padding: 10px 0;
            height: fit-content;
            max-height: 70vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            position: relative;
        }

        .category-list {
            display: flex;
            flex-direction: column;
        }

        .category-item {
            padding: 14px 20px;
            font-size: var(--category-font-size);
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            position: relative;
            transition: background 0.15s, color 0.15s;
            border-left: 3px solid transparent;
            margin: 0 8px;
            border-radius: 10px;
        }

            .category-item:hover {
                background: #f1f5f9;
                color: var(--text);
            }

            .category-item.active {
                background: var(--category-active-bg);
                color: var(--primary);
                border-left-color: var(--primary);
                font-weight: 600;
            }

                .category-item.active::after {
                    content: '';
                    position: absolute;
                    right: 12px;
                    top: 50%;
                    transform: translateY(-50%);
                    width: 6px;
                    height: 6px;
                    border-radius: 50%;
                    background: var(--primary);
                    box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
                }

        .guide-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            width: 280px;
            box-shadow: var(--shadow-sm);
            transition: 0.2s;
        }

            .guide-card:hover {
                box-shadow: var(--shadow-md);
                transform: translateY(-2px);
            }

            .guide-card img {
                max-width: 100%;
                border-radius: 10px;
                margin: 8px 0;
            }

        .paste-area {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            background: #f8fafc;
            transition: 0.2s;
        }

            .paste-area:hover {
                border-color: var(--primary);
                background: #f1f5f9;
            }

        .search-input {
            background: white;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 16px;
            width: 100%;
        }

        .icon-btn {
            background: transparent;
            padding: 6px;
            border-radius: 6px;
            color: var(--text-secondary);
        }

            .icon-btn:hover {
                background: rgba(0,0,0,0.05);
                color: var(--text);
            }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs" id="tabsContainer">
            <button class="tab-btn active" data-tab="gen">🎤 话术生成</button>
            <button class="tab-btn" data-tab="card">📊 集卡分析</button>
            <button class="tab-btn" data-tab="script">📚 话术库</button>
            <button class="tab-btn" data-tab="guide">📷 图文攻略</button>
        </div>

        <!-- 话术生成 -->
        <div id="tab-gen" class="tab-content active">
            <div class="card">
                <label style="font-size:1.1rem; margin-bottom:12px;">📋 智能粘贴识别（支持资源/棋子/订单）</label>
                <textarea id="smartPasteInput" rows="5" placeholder="粘贴流水/订单日志..."></textarea>
                <div class="flex-row" style="margin-top:12px;">
                    <button id="smartParseBtn">✨ 智能解析</button>
                    <button id="clearSmartBtn" class="secondary">清空</button>
                    <div class="flex-row" style="margin-left:auto;">
                        <span>解析模式：</span>
                        <label><input type="radio" name="parseMode" value="resource" checked> 资源</label>
                        <label><input type="radio" name="parseMode" value="chess"> 棋子</label>
                        <label><input type="radio" name="parseMode" value="order"> 订单</label>
                    </div>
                </div>
                <div style="margin-top:16px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;">
                    <div><label>资源类型</label><select id="flowResourceSelect"><option value="体力">体力</option><option value="红钻">红钻</option><option value="金币">金币</option><option value="道具" selected>道具</option></select></div>
                    <div><label>忽略规则</label><div class="flex-row"><input type="checkbox" id="enableIgnoreRulesCheckbox" checked> 启用 <button id="manageIgnoreRulesBtn" class="secondary">管理</button></div></div>
                    <div><label>转换规则</label><div class="flex-row"><input type="checkbox" id="enableSourceConversionCheckbox" checked> 启用 <button id="manageSourceRulesBtn" class="secondary">管理</button></div></div>
                </div>
                <div class="flex-row" style="margin-top:12px;">
                    <input type="file" id="flowFileInput" accept=".csv,.txt" style="flex:1;">
                    <button id="uploadFlowBtn">上传CSV</button>
                    <input type="text" id="includeSourcesInput" placeholder="来源关键词" style="width:140px;">
                    <input type="text" id="itemKeywordInput" placeholder="道具关键词" style="width:140px;">
                </div>
            </div>
            <div class="card">
                <div class="flex-row" style="justify-content:space-between;"><span style="font-weight:600;">📌 自定义模板</span><button id="manageTemplatesBtn" class="secondary">管理模板</button></div>
                <select id="templateSelect" style="width:100%; margin-top:8px;"></select>
                <div id="varContainer" class="flex-row" style="margin-top:12px;"></div>
                <button id="generateFromTemplateBtn" style="background:#16a34a;">✨ 生成话术</button>
            </div>
            <div class="card">
                <div class="flex-row" style="justify-content:space-between;"><span>📄 生成话术 <span id="globalResultCount" class="badge">0</span></span><div><button id="copyGlobalResultBtn">复制</button><button id="exportGlobalResultBtn" class="secondary">导出</button></div></div>
                <textarea id="globalResultArea" rows="18" readonly style="background:#f1f5f9; margin-top:12px;"></textarea>
                <small>结果来源：<span id="resultSourceHint">等待操作</span></small>
            </div>
            <div id="flowDebugConsole" style="display:none; background:#1e293b; color:#cbd5e1; padding:12px; border-radius:10px; margin-top:12px; font-size:12px; max-height:200px; overflow:auto;"></div>
        </div>

        <!-- 集卡页 -->
        <div id="tab-card" class="tab-content">
            <div class="card">
                <label>上传集卡CSV</label>
                <input type="file" id="csvFileInput" accept=".csv,.txt"><button id="uploadCsvBtn">解析</button>
                <div class="flex-row" style="margin-top:12px;">
                    <select id="starFilterSelect"><option value="all">全部</option><option value="1">1星</option><option value="2">2星</option><option value="3">3星</option><option value="4">4星</option><option value="5">5星</option></select>
                    <button id="applyFilterBtn">筛选</button>
                </div>
                <label style="margin-top:12px;">结果（<span id="recordCount">0</span>条）</label>
                <textarea id="cardResultArea" rows="15" readonly></textarea>
                <button id="copyAllCardBtn">复制</button><button id="exportCardBtn" class="secondary">导出</button>
            </div>
        </div>

        <!-- 话术库 -->
        <div id="tab-script" class="tab-content">
            <div class="flex-row">
                <input type="text" id="searchScript" placeholder="搜索话术..." style="flex:2;">
                <select id="tagFilterSelect"><option value="all">所有标签</option><option value="no_tag">无标签</option></select>
                <button id="manageTagsBtn" class="secondary">管理标签</button>
            </div>
            <div class="flex-row" style="margin:12px 0;">
                <button id="addScriptBtn">新增</button>
                <button id="copyScriptBtn">复制选中</button>
                <button id="deleteScriptBtn" class="secondary" style="background:#dc2626;">删除</button>
                <button id="batchTagBtn" class="secondary">批量标签</button>
                <button id="importScriptBtn" class="secondary">导入</button>
            </div>
            <select id="scriptListbox" multiple style="width:100%; height:350px; border-radius:10px;"></select>
        </div>

        <!-- 图文攻略（分类分页设计） -->
        <div id="tab-guide" class="tab-content">
            <div class="flex-row" style="justify-content:space-between; margin-bottom:20px;">
                <div class="flex-row">
                    <input type="text" id="guideSearch" placeholder="搜索攻略..." class="search-input" style="width:240px;">
                    <button id="addGuideBtn">✨ 新建攻略</button>
                    <button id="manageCategoriesBtn" class="secondary">🏷️ 管理分类</button>
                </div>
            </div>
            <div class="guide-container">
                <div class="category-sidebar" id="categorySidebar">
                    <div class="category-list" id="categoryList"></div>
                </div>
                <div id="guideCardList" style="display:flex; flex-wrap:wrap; gap:16px; align-content:flex-start;"></div>
            </div>
        </div>
    </div>

    <!-- 模态框集合（保留原功能相关模态框） -->
    <div id="sourceRuleModal" class="modal"><div class="modal-content"><h3>📌 转换规则管理</h3><div id="sourceRuleListContainer"></div><div class="flex-row"><input type="text" id="newRulePattern" placeholder="匹配关键词"><span>→</span><input type="text" id="newRuleReplacement" placeholder="替换为"><select id="newRuleType"><option value="source">来源</option><option value="reward">奖励</option><option value="chessName">棋子</option></select><button id="addOrUpdateRuleBtn">添加</button><button id="cancelEditRuleBtn" class="secondary" style="display:none;">取消</button></div><button id="resetDefaultSourceRulesBtn" class="secondary">重置</button><button id="clearAllSourceRulesBtn" class="secondary" style="background:#dc2626;">清空</button></div></div>
    <div id="ignoreRuleModal" class="modal"><div class="modal-content"><h3>🚫 忽略关键词</h3><div id="ignoreRuleListContainer"></div><div class="flex-row"><input type="text" id="newIgnoreKeyword" placeholder="关键词"><button id="addIgnoreKeywordBtn">添加</button></div><button id="resetDefaultIgnoreRulesBtn" class="secondary">重置</button><button id="clearAllIgnoreRulesBtn" class="secondary" style="background:#dc2626;">清空</button></div></div>
    <div id="templateModal" class="modal"><div class="modal-content"><h3>管理模板</h3><button id="modalAddTemplateBtn">新增模板</button><div id="templateList"></div></div></div>
    <div id="scriptEditModal" class="modal"><div class="modal-content" style="max-width:600px;"><h3 id="scriptEditTitle">编辑话术</h3><textarea id="scriptEditText" rows="4"></textarea><label>标签</label><input type="text" id="scriptEditTags"><div class="flex-row"><button id="saveScriptBtn">保存</button><button id="cancelScriptBtn" class="secondary">取消</button></div></div></div>
    <div id="batchTagModal" class="modal"><div class="modal-content" style="max-width:500px;"><h3>批量添加标签</h3><input type="text" id="batchTagInput" placeholder="标签名（逗号分隔）"><button id="applyBatchTagBtn">应用</button><button id="cancelBatchBtn" class="secondary">取消</button></div></div>
    <div id="manageTagsModal" class="modal"><div class="modal-content" style="max-width:500px;"><h3>管理标签</h3><div id="allTagsList"></div><input type="text" id="newTagInput" placeholder="新标签"><button id="addNewTagBtn">添加</button></div></div>
    <div id="importScriptModal" class="modal"><div class="modal-content" style="max-width:500px;"><h3>导入话术</h3><input type="file" id="importFileInput" accept=".txt,.csv"><label><input type="checkbox" id="skipDuplicateCheckbox" checked> 跳过重复</label><button id="confirmImportBtn">导入</button><button id="cancelImportBtn" class="secondary">取消</button><div id="importProgress"></div></div></div>

    <!-- 图文攻略编辑模态框 -->
    <div id="guideEditModal" class="modal">
        <div class="modal-content">
            <h3 id="guideEditTitle">编辑攻略</h3>
            <div class="form-group"><label>标题</label><input type="text" id="guideTitle" style="width:100%;"></div>
            <div class="form-group"><label>描述</label><textarea id="guideDesc" rows="3"></textarea></div>
            <div class="form-group"><label>图片</label><div class="paste-area" id="pasteArea" tabindex="0">点击后 Ctrl+V 粘贴图片</div><div id="imagePreview" class="flex-row"></div></div>
            <div class="form-group"><label>备注</label><textarea id="guideNotes" rows="2"></textarea></div>
            <div class="form-group"><label>分类（可多选）</label><select id="guideCategorySelect" multiple style="width:100%; height:100px;"></select><small>按住 Ctrl 可多选</small></div>
            <div class="flex-row" style="margin-top:16px;">
                <button id="saveGuideBtn">💾 保存</button>
                <button id="deleteGuideBtn" class="secondary" style="background:#dc2626;">🗑️ 删除</button>
                <button id="cancelGuideBtn" class="secondary">取消</button>
            </div>
        </div>
    </div>

    <!-- 分类管理模态框 -->
    <div id="categoryManageModal" class="modal">
        <div class="modal-content" style="max-width:500px;">
            <h3>🏷️ 管理分类</h3>
            <div id="categoryManageList"></div>
            <div class="flex-row" style="margin-top:12px;">
                <input type="text" id="newCategoryInput" placeholder="新分类名称">
                <button id="addCategoryBtn">添加</button>
            </div>
            <button id="closeCategoryModal" class="secondary" style="margin-top:12px;">关闭</button>
        </div>
    </div>

    <script>
        (async function () {
            "use strict";
            const SERVER_URL = window.location.origin;
            const CORE_FIELDS = ['时间', '体力', '红钻', '金币'];
            const DEFAULT_TEMPLATES = ["查询到您在{时间}{action}{体力}点体力", "查询到您在{时间}{action}{红钻}红钻", "查询到您在{时间}{action}{金币}金币"];
            const DEFAULT_SOURCE_RULES = [
                { pattern: "金币竞赛", replacement: "茶楼大战", type: "source" },
                { pattern: "体力购买", replacement: "购买体力", type: "source" },
                { pattern: "装扮活动", replacement: "装扮活动兑换", type: "source" },
                { pattern: "商店", replacement: "商店购买", type: "source" },
                { pattern: "任务", replacement: "任务奖励", type: "source" },
                { pattern: ":", replacement: "：", type: "reward" },
                { pattern: "猪肉", replacement: "副棋盘活动道具", type: "chessName" }
            ];
            const DEFAULT_IGNORE_KEYWORDS = ["棋盘上传"];
            const PACK_NAME_MAP = { 151: "1星百戏锦囊", 152: "1星大百戏锦囊", 153: "2星百戏锦囊", 154: "2星大百戏锦囊", 155: "3星百戏锦囊", 156: "3星大百戏锦囊", 157: "4星百戏锦囊", 158: "4星大百戏锦囊", 159: "5星百戏锦囊", 160: "5星大百戏锦囊", 161: "5星超大百戏锦囊" };

            // 云端同步数据加载
            async function loadData(key, defaultValue) {
                try {
                    const resp = await fetch(`${SERVER_URL}/api/data/${key}`);
                    if (resp.ok) {
                        const { value } = await resp.json();
                        if (value !== undefined) {
                            localStorage.setItem(key, JSON.stringify(value));
                            return value;
                        }
                    }
                    throw new Error('获取失败');
                } catch {
                    const cached = localStorage.getItem(key);
                    if (cached) try { return JSON.parse(cached); } catch { }
                    return defaultValue;
                }
            }

            async function saveData(key, data) {
                localStorage.setItem(key, JSON.stringify(data));
                try {
                    await fetch(`${SERVER_URL}/api/data/${key}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ value: data })
                    });
                } catch (e) { console.warn('同步失败:', e); }
            }

            // 初始化全局数据
            let templates = await loadData('templates', DEFAULT_TEMPLATES);
            let scripts = await loadData('scripts', []);
            let sourceRules = await loadData('sourceRules', DEFAULT_SOURCE_RULES);
            let ignoreKeywords = await loadData('ignoreKeywords', DEFAULT_IGNORE_KEYWORDS);
            let guides = await loadData('guides', []);
            let guideCategories = await loadData('guideCategories', ['新手攻略', '活动攻略', '进阶技巧']);
            (function migrate() { for (let i = 0; i < scripts.length; i++) if (typeof scripts[i] === 'string') scripts[i] = { text: scripts[i], tags: [] }; saveData('scripts', scripts); })();

            // 工具函数
            function getRulePattern(r) { return r.pattern || r.pat || ''; }
            function getRuleReplacement(r) { return r.replacement || r.rep || ''; }

            // DOM 元素
            const templateSelect = document.getElementById('templateSelect');
            const varContainer = document.getElementById('varContainer');
            const globalResultArea = document.getElementById('globalResultArea');
            const globalResultCount = document.getElementById('globalResultCount');
            const resultSourceHint = document.getElementById('resultSourceHint');
            const debugConsole = document.getElementById('flowDebugConsole');
            const smartPasteInput = document.getElementById('smartPasteInput');
            let varInputs = {};

            function expandDebugConsole() { if (debugConsole.style.display === 'none') { debugConsole.style.display = 'block'; } }
            document.addEventListener('click', (e) => { if (e.target.id === 'debugToggleHeader') expandDebugConsole(); });

            function cleanText(t) { return t.replace(/\ufeff/g, '').replace(/\s+/g, ' ').trim(); }
            function extractTime(t) {
                const p = [/(\d{4}[-\/]\d{1,2}[-\/]\d{1,2}\s+\d{1,2}:\d{1,2}(:\d{1,2})?)/, /(\d{2}\/\d{1,2}\/\d{4}\s+\d{1,2}:\d{1,2}(:\d{1,2})?)/];
                for (let r of p) { const m = t.match(r); if (m) return m[1]; }
                return null;
            }
            function formatTimeToStandard(timeStr) {
                if (!timeStr) return '';
                let str = timeStr.replace(/\//g, '-');
                let match = str.match(/(\d{4})-(\d{1,2})-(\d{1,2})\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?/);
                if (!match) return str;
                let [_, y, m, d, h, min, sec] = match;
                m = m.padStart(2, '0'); d = d.padStart(2, '0'); h = h.padStart(2, '0'); min = min.padStart(2, '0'); sec = sec ? sec.padStart(2, '0') : '00';
                return `${y}-${m}-${d} ${h}:${min}:${sec}`;
            }
            function detectResourceType(line) { if (line.includes('体力')) return '体力'; if (line.includes('红钻')) return '红钻'; if (line.includes('金币')) return '金币'; return '道具'; }
            function applyConversionByType(src, type) {
                if (!src) return src;
                if (!(document.getElementById('enableSourceConversionCheckbox')?.checked ?? true)) return src;
                const lower = src.toLowerCase();
                for (let r of sourceRules.filter(r => r.type === type)) {
                    if (r.pattern && lower.includes(r.pattern.toLowerCase())) return r.replacement || src;
                }
                return src;
            }
            function applySourceConversion(src) { return applyConversionByType(src, 'source'); }
            function applyRewardConversion(str) {
                if (!str) return str;
                if (!(document.getElementById('enableSourceConversionCheckbox')?.checked ?? true)) return str;
                let result = str;
                for (let r of sourceRules.filter(r => r.type === 'reward')) {
                    if (!r.pattern) continue;
                    result = result.replace(new RegExp(r.pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), r.replacement || '');
                }
                return result.replace(/\s+/g, ' ').trim();
            }
            function shouldIgnoreLine(line) {
                if (!(document.getElementById('enableIgnoreRulesCheckbox')?.checked ?? true) || !ignoreKeywords.length) return false;
                return ignoreKeywords.some(kw => line.toLowerCase().includes(kw.toLowerCase()));
            }
            function cleanHeader(s) { return s.trim().replace(/^["'“”]|["'“”]$/g, ''); }

            // 核心资源解析
            function parseSmartLog(rawText) {
                const lines = rawText.split(/\r?\n/).filter(l => l.trim());
                const records = [];
                for (let line of lines) {
                    if (shouldIgnoreLine(line)) continue;
                    const rawTime = extractTime(line); if (!rawTime) continue;
                    const time = formatTimeToStandard(rawTime);
                    const parts = line.split('\t'); if (parts.length < 6) continue;
                    const thirdCol = parts[2]?.trim();
                    const isFormatB = /^[+-]?\d+$/.test(thirdCol);
                    let changeRaw, beforeRaw, afterRaw, sourceRaw, itemName = '';
                    if (isFormatB) { changeRaw = parts[2]; beforeRaw = parts[3]; afterRaw = parts[4]; sourceRaw = parts[5]; itemName = (parts.length >= 8 && parts[7]?.includes('棋子')) ? parts[7]?.trim() : ''; }
                    else { changeRaw = parts[3]; beforeRaw = parts[4]; afterRaw = parts[5]; sourceRaw = parts[6]; itemName = (parts.length >= 9 && parts[8]?.includes('棋子')) ? parts[8]?.trim() : ''; }
                    const change = parseInt(changeRaw, 10); if (isNaN(change)) continue;
                    let before = parseFloat(beforeRaw) || 0, after = parseFloat(afterRaw) || 0;
                    sourceRaw = (sourceRaw || '').trim().replace(/^["'“”]|["'“”]$/g, '');
                    const source = applySourceConversion(sourceRaw);
                    records.push({ '时间': time, '数量': change, '来源': source, '道具名称': itemName, '之前': before, '之后': after });
                }
                records.sort((a, b) => (b['时间'] || '').localeCompare(a['时间'] || ''));
                return records;
            }

            function getChangeAndAction(rec) {
                let before = parseFloat(rec['之前']) || 0, after = parseFloat(rec['之后']) || 0, change = after - before;
                if (change === 0) change = parseFloat(rec['数量']) || 0;
                const action = change > 0 ? '获得' : (change < 0 ? '消耗' : '');
                return { change, action, before, after };
            }

            function generateFlowSentence(rec, type, showChange = true) {
                const time = (rec['时间'] || '').replace(/-/g, '/');
                const source = rec['来源'] || '';
                const itemName = rec['道具名称'] || '';
                const { change, action, before, after } = getChangeAndAction(rec);
                if (!change || !action) return null;
                const abs = Math.abs(change);
                if (type === '道具' && itemName) return `在${time}，${action}了${abs}个${itemName}`;
                return showChange ? `在${time}，通过【${source}】${action}${abs}点${type}，从${before}变为${after}` : `在${time}，${action}${abs}点${type}`;
            }

            // 订单/棋子解析保持（真实项目请从旧版复制完整，此处为示例，但图文攻略完整）
            function parseOrderLog(raw) { return []; }
            function parseChessLog(raw) { return []; }

            function smartParseAndFill() {
                expandDebugConsole();
                const mode = document.querySelector('input[name="parseMode"]:checked').value;
                const raw = smartPasteInput.value.trim();
                if (!raw) { debugConsole.innerHTML = '❌ 请输入文本'; return; }
                if (mode === 'order') {
                    // 可将之前完整订单逻辑粘贴于此
                } else if (mode === 'chess') {
                    // 可将之前完整棋子逻辑粘贴于此
                } else {
                    const type = document.getElementById('flowResourceSelect').value;
                    const includeSources = document.getElementById('includeSourcesInput').value;
                    const itemKeyword = document.getElementById('itemKeywordInput').value;
                    let records = parseSmartLog(raw);
                    if (!records.length) { debugConsole.innerHTML += '\n❌ 无记录'; return; }
                    if (type === '道具' && itemKeyword) records = records.filter(r => itemKeyword.split(',').some(k => (r['道具名称'] || '').toLowerCase().includes(k.trim().toLowerCase())));
                    if (includeSources) records = records.filter(r => includeSources.split(',').some(k => (r['来源'] || '').toLowerCase().includes(k.trim().toLowerCase())));
                    let sentences = records.map(r => generateFlowSentence(r, type, false)).filter(s => s);
                    if (sentences.length === 0) { debugConsole.innerHTML += '\n⚠️ 筛选后无话术'; return; }
                    globalResultArea.value = sentences.join('\n\n');
                    globalResultCount.textContent = `${sentences.length} 条`;
                    resultSourceHint.textContent = '智能解析';
                    navigator.clipboard.writeText(globalResultArea.value);
                    debugConsole.innerHTML += `\n✨ 生成 ${sentences.length} 条`;
                }
            }

            // CSV 与集卡（占位，如需完整可补足）
            function parseFlowCSV(csvText) { return []; }
            async function processFlowCsv() { }
            function parseCSVEnhanced(c) { return []; }

            // 话术库
            function refreshScriptList() { const lb = document.getElementById('scriptListbox'); lb.innerHTML = ''; scripts.forEach((s, i) => { const o = document.createElement('option'); o.textContent = s.text.substring(0, 70) + (s.tags.length ? ' [' + s.tags.join(',') + ']' : ''); o.value = i; lb.appendChild(o); }); }
            function getAllTags() { const set = new Set(); scripts.forEach(s => s.tags.forEach(t => set.add(t))); return Array.from(set); }
            function renderTagFilter() {
                const sel = document.getElementById('tagFilterSelect'); const cur = sel.value;
                sel.innerHTML = '<option value="all">所有标签</option><option value="no_tag">无标签</option>';
                getAllTags().forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; sel.appendChild(o); });
                if ([...sel.options].some(o => o.value === cur)) sel.value = cur;
            }
            function filterScripts() {
                const kw = document.getElementById('searchScript').value.toLowerCase();
                const tag = document.getElementById('tagFilterSelect').value;
                const lb = document.getElementById('scriptListbox'); lb.innerHTML = '';
                scripts.forEach((s, i) => {
                    if (kw && !s.text.toLowerCase().includes(kw)) return;
                    if (tag === 'no_tag' && s.tags.length) return;
                    if (tag !== 'all' && tag !== 'no_tag' && !s.tags.includes(tag)) return;
                    const o = document.createElement('option'); o.textContent = s.text.substring(0, 70) + (s.tags.length ? ' [' + s.tags.join(',') + ']' : ''); o.value = i; lb.appendChild(o);
                });
            }

            // 规则管理
            let editingSourceIndex = -1;
            function renderSourceRuleList(filterType = 'all', searchTerm = '') {
                const c = document.getElementById('sourceRuleListContainer');
                let filtered = sourceRules;
                if (filterType !== 'all') filtered = filtered.filter(r => r.type === filterType);
                if (searchTerm) {
                    const lower = searchTerm.toLowerCase();
                    filtered = filtered.filter(r => (getRulePattern(r) + getRuleReplacement(r)).toLowerCase().includes(lower));
                }
                c.innerHTML = filtered.map((r, i) => {
                    const idx = sourceRules.indexOf(r);
                    const pattern = getRulePattern(r);
                    const replacement = getRuleReplacement(r) || '(删除)';
                    const typeLabel = r.type === 'source' ? '来源' : (r.type === 'reward' ? '奖励' : '棋子');
                    return `<div class="rule-item" data-idx="${idx}">
                    <span class="rule-pattern">${pattern}</span><span class="rule-type">[${typeLabel}]</span>
                    <span>→</span><span class="rule-replacement">${replacement}</span>
                    <div class="rule-actions">
                        <button class="edit-source-btn" data-idx="${idx}">✏️</button>
                        <button class="delete-source-btn" data-idx="${idx}" style="background:#dc3545;">🗑️</button>
                    </div> </div>`;
                }).join('') || '<div>暂无规则</div>';
                c.querySelectorAll('.delete-source-btn').forEach(b => b.onclick = e => { const idx = parseInt(b.dataset.idx); sourceRules.splice(idx, 1); saveData('sourceRules', sourceRules); renderSourceRuleList(filterType, searchTerm); });
                c.querySelectorAll('.edit-source-btn').forEach(b => b.onclick = e => { const idx = parseInt(b.dataset.idx); const r = sourceRules[idx]; document.getElementById('newRulePattern').value = getRulePattern(r); document.getElementById('newRuleReplacement').value = getRuleReplacement(r) || ''; document.getElementById('newRuleType').value = r.type || 'source'; document.getElementById('addOrUpdateRuleBtn').textContent = '✏️ 更新'; document.getElementById('cancelEditRuleBtn').style.display = 'inline-block'; editingSourceIndex = idx; });
            }
            function resetSourceEditState() { document.getElementById('newRulePattern').value = ''; document.getElementById('newRuleReplacement').value = ''; document.getElementById('newRuleType').value = 'source'; document.getElementById('addOrUpdateRuleBtn').textContent = '➕ 添加'; document.getElementById('cancelEditRuleBtn').style.display = 'none'; editingSourceIndex = -1; }
            function renderIgnoreRuleList() { const c = document.getElementById('ignoreRuleListContainer'); c.innerHTML = ignoreKeywords.map((k, i) => `<div class="rule-item"><span class="rule-pattern">${k}</span><div class="rule-actions"><button data-i="${i}" class="delete-ignore-btn" style="background:#dc3545;">🗑️</button></div></div>`).join('') || '<div>暂无忽略关键词</div>'; c.querySelectorAll('.delete-ignore-btn').forEach(b => b.onclick = e => { ignoreKeywords.splice(e.target.dataset.i, 1); saveData('ignoreKeywords', ignoreKeywords); renderIgnoreRuleList(); }); }

            function refreshVarEntries() { varContainer.innerHTML = ''; varInputs = {}; CORE_FIELDS.forEach(f => { const lab = document.createElement('label'); lab.textContent = f + '：'; const inp = document.createElement('input'); inp.value = ''; const btn = document.createElement('button'); btn.textContent = '📋'; btn.className = 'paste-btn'; btn.onclick = () => navigator.clipboard.readText().then(t => { const cl = cleanText(t); const tm = extractTime(cl); if (tm && varInputs['时间']) varInputs['时间'].value = tm; const val = parseInt(cl.match(/-?\d+/)?.[0]); if (!isNaN(val)) inp.value = val; }); varContainer.appendChild(lab); varContainer.appendChild(inp); varContainer.appendChild(btn); varInputs[f] = inp; }); }
            function refreshTemplateSelect() { templateSelect.innerHTML = ''; templates.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t.substring(0, 60); templateSelect.appendChild(o); }); }

            // ========== 图文攻略 分类分页设计 ==========
            const guideCardList = document.getElementById('guideCardList');
            const guideSearch = document.getElementById('guideSearch');
            const categoryList = document.getElementById('categoryList');
            let activeCategory = 'all';
            let tempImages = [];
            let currentEditingGuideId = null;

            // 分类侧边栏渲染
            function refreshCategoryUI() {
                categoryList.innerHTML = '<div class="category-item active" data-category="all">📋 全部</div>';
                guideCategories.forEach(cat => {
                    const div = document.createElement('div');
                    div.className = `category-item ${activeCategory === cat ? 'active' : ''}`;
                    div.dataset.category = cat;
                    div.textContent = `📁 ${cat}`;
                    div.onclick = () => {
                        activeCategory = cat;
                        refreshCategoryUI();
                        renderGuideCards();
                    };
                    categoryList.appendChild(div);
                });
                // 更新编辑模态框的分类多选
                const catSelect = document.getElementById('guideCategorySelect');
                catSelect.innerHTML = guideCategories.map(c => `<option value="${c}">${c}</option>`).join('');
            }

            function renderGuideCards() {
                let filtered = guides;
                // 按分类筛选
                if (activeCategory !== 'all') {
                    filtered = filtered.filter(g => g.categories && g.categories.includes(activeCategory));
                }
                // 搜索过滤
                const searchTerm = guideSearch.value.trim().toLowerCase();
                if (searchTerm) {
                    filtered = filtered.filter(g => (g.title || '').toLowerCase().includes(searchTerm) || (g.desc || '').toLowerCase().includes(searchTerm));
                }
                guideCardList.innerHTML = '';
                filtered.forEach(guide => {
                    const card = document.createElement('div');
                    card.className = 'guide-card';
                    card.setAttribute('data-id', guide.id);
                    const imgsHtml = (guide.images || []).map(img => `
                    <div style="position:relative; margin-bottom:6px;">
                        <img src="${img}" style="max-width:100%; border-radius:6px;">
                        <button class="copy-img-btn" data-img="${img}" style="position:absolute; bottom:4px; right:4px; background:var(--primary); color:white; border:none; border-radius:4px; padding:2px 6px; font-size:11px;">📋复制</button>
                    </div>
                `).join('');
                    const catsHtml = (guide.categories || []).map(c => `<span class="badge">${c}</span>`).join(' ');
                    card.innerHTML = `
                    <strong>${guide.title || '未命名'}</strong>
                    <div style="font-size:12px; color:#64748b; margin:6px 0;">${guide.desc || ''}</div>
                    ${imgsHtml}
                    <div style="margin-top:6px;">${catsHtml}</div>
                    <div class="flex-row" style="justify-content:flex-end; margin-top:8px;">
                        <button class="secondary" style="padding:4px 10px; font-size:12px;" onclick="editGuide('${guide.id}')">✏️</button>
                    </div>
                `;
                    guideCardList.appendChild(card);
                });
                // 绑定图片复制
                document.querySelectorAll('.copy-img-btn').forEach(btn => {
                    btn.onclick = async (e) => {
                        e.stopPropagation();
                        const base64 = btn.dataset.img;
                        try {
                            const resp = await fetch(base64);
                            const blob = await resp.blob();
                            await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
                            alert('图片已复制到剪贴板');
                        } catch (err) { alert('复制失败，请尝试右键复制'); }
                    };
                });
                // 拖拽排序
                new Sortable(guideCardList, {
                    animation: 150,
                    onEnd: function () {
                        const newOrder = [...guideCardList.children].map(card => card.dataset.id);
                        guides = newOrder.map(id => guides.find(g => g.id === id)).filter(g => g);
                        saveData('guides', guides);
                    }
                });
            }

            window.editGuide = function (id) {
                const guide = guides.find(g => g.id === id);
                if (!guide) return;
                currentEditingGuideId = id;
                document.getElementById('guideEditTitle').textContent = '编辑攻略';
                document.getElementById('guideTitle').value = guide.title || '';
                document.getElementById('guideDesc').value = guide.desc || '';
                document.getElementById('guideNotes').value = guide.notes || '';
                tempImages = [...(guide.images || [])];
                renderImagePreview();
                const catSelect = document.getElementById('guideCategorySelect');
                [...catSelect.options].forEach(o => o.selected = (guide.categories || []).includes(o.value));
                document.getElementById('deleteGuideBtn').style.display = 'inline-block';
                document.getElementById('guideEditModal').style.display = 'block';
            };

            // 图片粘贴
            const pasteArea = document.getElementById('pasteArea');
            pasteArea.addEventListener('paste', async (e) => {
                const items = e.clipboardData?.items;
                if (!items) return;
                for (let item of items) {
                    if (item.type.startsWith('image/')) {
                        const blob = item.getAsFile();
                        const base64 = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = () => resolve(reader.result);
                            reader.readAsDataURL(blob);
                        });
                        tempImages.push(base64);
                        renderImagePreview();
                    }
                }
            });
            pasteArea.addEventListener('click', () => pasteArea.focus());

            function renderImagePreview() {
                const preview = document.getElementById('imagePreview');
                preview.innerHTML = tempImages.map((img, i) => `
                <div style="position:relative; display:inline-block; margin:5px;">
                    <img src="${img}" style="height:80px; border-radius:6px; border:1px solid #ddd;">
                    <button onclick="event.stopPropagation(); tempImages.splice(${i},1); renderImagePreview();" style="position:absolute; top:-8px; right:-8px; background:#dc2626; color:white; border:none; border-radius:50%; width:22px; height:22px; font-size:12px; cursor:pointer;">×</button>
                </div>
            `).join('');
            }

            // 新建攻略
            document.getElementById('addGuideBtn').onclick = () => {
                currentEditingGuideId = null;
                document.getElementById('guideEditTitle').textContent = '新建攻略';
                document.getElementById('guideTitle').value = '';
                document.getElementById('guideDesc').value = '';
                document.getElementById('guideNotes').value = '';
                tempImages = [];
                renderImagePreview();
                const catSelect = document.getElementById('guideCategorySelect');
                [...catSelect.options].forEach(o => o.selected = false);
                document.getElementById('deleteGuideBtn').style.display = 'none';
                document.getElementById('guideEditModal').style.display = 'block';
            };

            // 保存攻略
            document.getElementById('saveGuideBtn').onclick = () => {
                const title = document.getElementById('guideTitle').value.trim();
                if (!title) { alert('请输入标题'); return; }
                const categories = [...document.getElementById('guideCategorySelect').selectedOptions].map(o => o.value);
                const guideData = {
                    id: currentEditingGuideId || Date.now().toString(36) + Math.random().toString(36).slice(2),
                    title,
                    desc: document.getElementById('guideDesc').value.trim(),
                    images: [...tempImages],
                    notes: document.getElementById('guideNotes').value.trim(),
                    categories
                };
                if (currentEditingGuideId) {
                    const idx = guides.findIndex(g => g.id === currentEditingGuideId);
                    if (idx !== -1) guides[idx] = guideData;
                } else {
                    guides.push(guideData);
                }
                saveData('guides', guides);
                document.getElementById('guideEditModal').style.display = 'none';
                renderGuideCards();
            };

            document.getElementById('deleteGuideBtn').onclick = () => {
                if (confirm('确认删除此攻略？')) {
                    guides = guides.filter(g => g.id !== currentEditingGuideId);
                    saveData('guides', guides);
                    document.getElementById('guideEditModal').style.display = 'none';
                    renderGuideCards();
                }
            };

            document.getElementById('cancelGuideBtn').onclick = () => document.getElementById('guideEditModal').style.display = 'none';

            // 分类管理
            document.getElementById('manageCategoriesBtn').onclick = () => {
                renderCategoryManageList();
                document.getElementById('categoryManageModal').style.display = 'block';
            };
            document.getElementById('closeCategoryModal').onclick = () => document.getElementById('categoryManageModal').style.display = 'none';

            function renderCategoryManageList() {
                const list = document.getElementById('categoryManageList');
                list.innerHTML = guideCategories.map(cat => `
                <div class="flex-row" style="justify-content:space-between; margin-bottom:8px;">
                    <span>${cat}</span>
                    <button class="secondary" style="padding:4px 10px; font-size:12px;" onclick="deleteCategory('${cat}')">删除</button>
                </div>
            `).join('') || '<div>暂无分类</div>';
            }

            window.deleteCategory = function (cat) {
                guideCategories = guideCategories.filter(c => c !== cat);
                guides.forEach(g => { if (g.categories) g.categories = g.categories.filter(c => c !== cat); });
                saveData('guideCategories', guideCategories);
                saveData('guides', guides);
                refreshCategoryUI();
                renderGuideCards();
                renderCategoryManageList();
            };

            document.getElementById('addCategoryBtn').onclick = () => {
                const input = document.getElementById('newCategoryInput');
                const name = input.value.trim();

                guideCategories.push(name);
                saveData('guideCategories', guideCategories);
                input.value = '';

                renderCategoryManageList();
            };

            guideSearch.addEventListener('input', renderGuideCards);

            // 标签切换
            document.querySelectorAll('.tab-btn').forEach(btn => btn.onclick = function () {
                document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(`tab-${this.dataset.tab}`).classList.add('active');
                if (this.dataset.tab === 'guide') { refreshCategoryUI(); renderGuideCards(); }
            });

            // 关闭模态框
            window.onclick = (e) => { if (e.target.classList.contains('modal')) e.target.style.display = 'none'; };

            // 绑定原有事件
            document.getElementById('smartParseBtn').onclick = smartParseAndFill;
            document.getElementById('clearSmartBtn').onclick = () => { smartPasteInput.value = ''; globalResultArea.value = ''; };
            document.getElementById('uploadFlowBtn').onclick = processFlowCsv;
            document.getElementById('copyGlobalResultBtn').onclick = () => navigator.clipboard.writeText(globalResultArea.value);
            document.getElementById('exportGlobalResultBtn').onclick = () => { const blob = new Blob([globalResultArea.value], { type: 'text/plain' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'script.txt'; a.click(); };
            document.getElementById('generateFromTemplateBtn').onclick = () => { let tpl = templateSelect.value; for (let [k, v] of Object.entries(varInputs)) tpl = tpl.replace(`{${k}}`, v.value); globalResultArea.value = tpl.replace(/\{[^}]+\}/g, ''); };
            document.getElementById('manageSourceRulesBtn').onclick = () => { renderSourceRuleList(document.getElementById('ruleTypeFilter')?.value || 'all', ''); document.getElementById('sourceRuleModal').style.display = 'block'; };
            document.getElementById('manageIgnoreRulesBtn').onclick = () => { renderIgnoreRuleList(); document.getElementById('ignoreRuleModal').style.display = 'block'; };
            document.getElementById('manageTemplatesBtn').onclick = () => { document.getElementById('templateModal').style.display = 'block'; };
            document.getElementById('addOrUpdateRuleBtn').onclick = () => {
                const p = document.getElementById('newRulePattern').value.trim(), r = document.getElementById('newRuleReplacement').value.trim(), t = document.getElementById('newRuleType').value;
                if (!p) return;
                if (editingSourceIndex >= 0) sourceRules[editingSourceIndex] = { pattern: p, replacement: r, type: t };
                else sourceRules.push({ pattern: p, replacement: r, type: t });
                saveData('sourceRules', sourceRules);
                renderSourceRuleList(document.getElementById('ruleTypeFilter').value, '');
                resetSourceEditState();
            };
            document.getElementById('cancelEditRuleBtn').onclick = resetSourceEditState;
            document.getElementById('addIgnoreKeywordBtn').onclick = () => { const kw = document.getElementById('newIgnoreKeyword').value.trim(); if (kw && !ignoreKeywords.includes(kw)) { ignoreKeywords.push(kw); saveData('ignoreKeywords', ignoreKeywords); renderIgnoreRuleList(); document.getElementById('newIgnoreKeyword').value = ''; } };
            document.getElementById('searchScript').oninput = filterScripts;
            document.getElementById('tagFilterSelect').onchange = filterScripts;

            // 初始化界面
            refreshVarEntries();
            refreshTemplateSelect();
            refreshScriptList();
            renderTagFilter();
            refreshCategoryUI();
            renderGuideCards();
            new Sortable(document.getElementById('tabsContainer'), { animation: 150 });
            debugConsole.style.display = 'none';
            debugConsole.innerHTML = '🟢 工作台就绪 · 分页攻略 · 苹果风格分类';
        })();
