<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客服冷静演绎工作台</title>
    <link rel="icon" type="image/gif" href="/my-icon.gif">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root {
            --primary: #0d6efd;
            --primary-hover: #0b5ed7;
            --bg: #f0f2f5;
            --surface: #ffffff;
            --border: #dee2e6;
            --text: #495057;
            --text-secondary: #6c757d;
            --radius: 12px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .tabs {
            display: flex;
            background: #ffffff;
            border-bottom: 2px solid var(--border);
            padding: 0 16px;
            flex-wrap: wrap;
            cursor: grab;
        }

            .tabs:active {
                cursor: grabbing;
            }

        .tab-btn {
            background: none;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            color: var(--text);
            font-weight: 500;
            user-select: none;
        }

            .tab-btn:hover {
                background: #e9ecef;
                border-bottom-color: #adb5bd;
                color: var(--primary);
            }

            .tab-btn.active {
                color: var(--primary);
                border-bottom-color: var(--primary);
                background: #f8f9fa;
                font-weight: 600;
            }

        .tab-content {
            display: none;
            padding: 24px;
            animation: fade 0.2s;
        }

            .tab-content.active {
                display: block;
            }

        @keyframes fade {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            font-weight: 500;
            display: block;
            margin-bottom: 6px;
        }

        select, input, textarea, button {
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

            button:hover {
                background: var(--primary-hover);
            }

        .secondary {
            background: #6c757d;
        }

            .secondary:hover {
                background: #5a6268;
            }

        .flex-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .var-grid {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 12px 16px;
            align-items: center;
            margin-bottom: 16px;
        }

        textarea {
            width: 100%;
            font-family: monospace;
        }

        .card {
            background: #f8f9fa;
            border-radius: var(--radius);
            padding: 16px;
            margin-top: 16px;
        }

        .paste-btn {
            background: #28a745;
            padding: 6px 10px;
            font-size: 12px;
        }

            .paste-btn:hover {
                background: #218838;
            }

        .debug-console {
            background: #1e1e1e;
            color: #d4d4d4;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow: auto;
            white-space: pre-wrap;
            display: none;
        }

        .reset-btn {
            background: #dc3545;
            margin-left: 8px;
        }

            .reset-btn:hover {
                background: #c82333;
            }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 20px;
            border-radius: 16px;
            width: 80%;
            max-width: 800px;
            max-height: 80%;
            overflow: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .close {
            font-size: 28px;
            cursor: pointer;
        }

        .badge {
            background: #0d6efd20;
            color: #0b5ed7;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 6px;
        }

        .rule-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #dee2e6;
        }

            .rule-item.highlight {
                background: #fff3cd;
                border-radius: 8px;
                padding: 8px;
            }

        .rule-pattern {
            background: #e9ecef;
            padding: 4px 8px;
            border-radius: 20px;
            font-family: monospace;
        }

        .rule-replacement {
            font-weight: 600;
            color: #0d6efd;
        }

        .rule-type {
            font-size: 12px;
            color: #6c757d;
            margin-left: 8px;
        }

        .rule-actions {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }

        .inline-form {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .inline-card {
            background: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 16px;
        }

        .collapsible-header {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            margin-bottom: 8px;
        }

            .collapsible-header .arrow {
                transition: transform 0.2s;
                font-size: 18px;
            }

        .collapsible-content {
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

            .collapsible-content.collapsed {
                max-height: 0 !important;
                padding: 0 !important;
                margin: 0 !important;
            }

        .rule-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            align-items: stretch;
            margin-bottom: 16px;
        }

            .rule-bar > div {
                background: #f8f9fa;
                padding: 8px 12px;
                border-radius: 8px;
                display: flex;
                align-items: center;
                gap: 8px;
                flex-wrap: wrap;
                min-height: 54px;
            }

        .compact-select {
            width: 100px;
        }

        .upload-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: stretch;
        }

        .upload-col {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
        }

            .upload-col label {
                margin-bottom: 4px;
                font-weight: 500;
                font-size: 14px;
            }

        .file-upload-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
        }

            .file-upload-wrapper input[type="file"] {
                flex: 1;
                min-width: 0;
                height: 38px;
                padding: 6px 10px;
            }

            .file-upload-wrapper button {
                height: 38px;
                white-space: nowrap;
                padding: 0 16px;
            }

        input[type="text"], select {
            height: 38px;
        }

        .checkbox-label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-weight: normal;
            margin: 0;
        }

        .debug-toggle {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 0;
            color: #495057;
        }

        .parse-mode-group {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            margin-left: auto;
            align-items: center;
        }

        .hint-text {
            font-size: 12px;
            color: #6c757d;
            margin-top: 4px;
        }

        .search-box {
            position: relative;
        }

            .search-box input {
                padding-right: 30px;
            }

            .search-box .clear-search {
                position: absolute;
                right: 8px;
                top: 50%;
                transform: translateY(-50%);
                cursor: pointer;
                color: #aaa;
            }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs" id="tabsContainer">
            <button class="tab-btn active" data-tab="gen">🎤 话术生成</button>
            <button class="tab-btn" data-tab="card">📊 集卡分析</button>
            <button class="tab-btn" data-tab="script">📚 话术库</button>
        </div>

        <!-- 话术生成 gen -->
        <div id="tab-gen" class="tab-content active">
            <div class="inline-card" style="margin-bottom: 20px;">
                <label style="font-size: 1.1rem; margin-bottom: 10px;">📋 智能粘贴识别（支持资源/棋子/订单）</label>
                <textarea id="smartPasteInput" rows="5" placeholder="粘贴流水/订单日志，例如：&#10;2026-04-20 16:04:00	51b2bb98971c8d2323c225edd44a5512	体力	-1	326	325	棋盘操作-临时母棋生产	0-货币"></textarea>
                <div class="flex-row" style="margin-top:8px;">
                    <button id="smartParseBtn">✨ 智能解析</button>
                    <button id="clearSmartBtn" class="secondary">清空</button>
                    <div class="parse-mode-group">
                        <span>解析模式：</span>
                        <label class="checkbox-label"><input type="radio" name="parseMode" value="resource" checked> 资源流水</label>
                        <label class="checkbox-label"><input type="radio" name="parseMode" value="chess"> 棋子流水</label>
                        <label class="checkbox-label"><input type="radio" name="parseMode" value="order"> 订单日志</label>
                    </div>
                </div>
                <div style="border-top: 1px solid #e0e0e0; margin: 16px 0;"></div>
                <div class="rule-bar">
                    <div><label style="margin:0; font-weight:600;">资源类型</label><select id="flowResourceSelect" class="compact-select"><option value="体力">体力</option><option value="红钻">红钻</option><option value="金币">金币</option><option value="道具" selected>道具</option></select></div>
                    <div><strong>🚫 忽略</strong><label class="checkbox-label"><input type="checkbox" id="enableIgnoreRulesCheckbox" checked> 启用</label><button id="manageIgnoreRulesBtn" class="secondary">管理</button></div>
                    <div><strong>📌 转换</strong><label class="checkbox-label"><input type="checkbox" id="enableSourceConversionCheckbox" checked> 启用</label><button id="manageSourceRulesBtn" class="secondary">管理</button></div>
                </div>
                <div class="upload-row">
                    <div class="upload-col"><label>📁 上传流水CSV</label><div class="file-upload-wrapper"><input type="file" id="flowFileInput" accept=".csv,.txt" /><button id="uploadFlowBtn">上传解析</button><button id="debugFlowBtn" class="secondary">调试</button></div></div>
                    <div class="upload-col"><label>来源关键词</label><input type="text" id="includeSourcesInput" placeholder="例如：棋盘,体力购买"></div>
                    <div class="upload-col"><label>道具关键词</label><input type="text" id="itemKeywordInput" placeholder="例如：百戏锦囊"></div>
                </div>
            </div>

            <div class="card" style="padding: 12px 16px;">
                <div class="collapsible-header" id="toggleTemplateHeader"><span class="arrow" id="toggleArrow">▼</span><span>📌 手动自定义话术</span><div style="margin-left:auto; display:flex; gap:8px;"><button id="manageTemplatesBtn" class="secondary">管理模板</button><button id="resetRulesBtn" class="reset-btn">重置默认</button></div></div>
                <div class="collapsible-content" id="templateContent" style="max-height:500px;">
                    <div class="form-group" style="margin-top:12px;"><label>选择模板：</label><select id="templateSelect" style="width:100%;"></select></div>
                    <label>📝 变量值</label><div id="varContainer" class="var-grid"></div>
                    <div class="flex-row"><button id="generateFromTemplateBtn" style="background:#28a745;">✨ 模板生成话术</button></div>
                </div>
            </div>

            <div class="card" style="margin-top:20px;">
                <div class="result-header"><label>📄 生成话术 <span id="globalResultCount" class="badge">0 条/组</span></label><div class="flex-row"><button id="copyGlobalResultBtn">📋 复制全部</button><button id="exportGlobalResultBtn">💾 导出TXT</button></div></div>
                <textarea id="globalResultArea" rows="20" readonly style="background:#e9ecef;"></textarea>
                <small>结果来源：<span id="resultSourceHint">等待操作</span></small>
            </div>
            <div style="margin-top:12px;"><div id="debugToggleHeader" class="debug-toggle"><span id="debugArrow">▶</span><span>🔍 调试日志</span></div><div id="flowDebugConsole" class="debug-console"></div></div>
        </div>

        <!-- 集卡页 card -->
        <div id="tab-card" class="tab-content">
            <div class="form-group"><label>上传集卡CSV文件</label><input type="file" id="csvFileInput" accept=".csv,.txt" /><button id="uploadCsvBtn" style="margin-top:8px;">📂 上传并解析</button><button id="debugCardBtn" class="secondary">🔍 调试</button></div>
            <div class="form-group"><label>按卡包星级筛选：</label><select id="starFilterSelect"><option value="all">全部</option><option value="1">1星</option><option value="2">2星</option><option value="3">3星</option><option value="4">4星</option><option value="5">5星</option></select><button id="applyFilterBtn" style="margin-left:8px;">应用筛选</button></div>
            <div class="card"><label>生成结果（共 <span id="recordCount">0</span> 条）</label><textarea id="cardResultArea" rows="20" readonly></textarea><div class="flex-row"><button id="copyAllCardBtn">📋 复制全部</button><button id="exportCardBtn">💾 导出TXT</button></div></div>
        </div>

        <!-- 话术库 script -->
        <div id="tab-script" class="tab-content">
            <div class="flex-row"><input type="text" id="searchScript" placeholder="搜索话术内容..." style="flex:2;"><select id="tagFilterSelect" style="flex:1;"><option value="all">所有标签</option><option value="no_tag">无标签</option></select><button id="manageTagsBtn" class="secondary">🏷️ 管理标签</button></div>
            <div class="flex-row" style="margin:12px 0;">
                <button id="addScriptBtn">➕ 新增话术</button>
                <button id="copyScriptBtn">📋 复制选中</button>
                <button id="batchTagBtn" class="secondary">🏷️ 批量打标签</button>
                <button id="deleteScriptBtn" class="reset-btn">🗑️ 批量删除</button>
                <button id="importScriptBtn" class="secondary">📂 导入文本</button>
            </div>
            <select id="scriptListbox" size="15" style="width:100%; height:350px;" multiple></select>
            <small>按住 Ctrl 或 Shift 可多选</small>
        </div>
    </div>

    <!-- 模态框集合 -->
    <div id="sourceRuleModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>📌 文本转换规则管理</h3><span class="close" id="closeSourceRuleModal">&times;</span></div><p class="hint-text">✨ 按类型管理转换规则：来源、订单奖励、棋子名称。可搜索定位。</p><div class="flex-row" style="margin-bottom:12px;"><select id="ruleTypeFilter" style="width:140px;"><option value="all">全部类型</option><option value="source">来源</option><option value="reward">订单奖励</option><option value="chessName">棋子名称</option></select><div class="search-box" style="flex:1;"><input type="text" id="ruleSearchInput" placeholder="搜索关键词或替换内容..."><span class="clear-search" id="clearRuleSearch" style="display:none;">✕</span></div></div><div id="sourceRuleListContainer" style="max-height:250px; overflow:auto; border:1px solid #dee2e6; border-radius:8px; padding:8px;"></div><div class="inline-form"><select id="newRuleType" style="width:120px;"><option value="source">来源</option><option value="reward">订单奖励</option><option value="chessName">棋子名称</option></select><input type="text" id="newRulePattern" placeholder="匹配关键词" style="flex:2;"><span>→</span><input type="text" id="newRuleReplacement" placeholder="替换为（留空删除）" style="flex:3;"><button id="addOrUpdateRuleBtn" style="background:#28a745;">➕ 添加</button><button id="cancelEditRuleBtn" class="secondary" style="display:none;">取消</button></div><div class="flex-row" style="margin-top:16px; justify-content:space-between;"><button id="resetDefaultSourceRulesBtn" class="secondary">重置推荐规则</button><button id="clearAllSourceRulesBtn" class="reset-btn">清空所有规则</button></div></div></div>
    <div id="ignoreRuleModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>🚫 忽略关键词管理</h3><span class="close" id="closeIgnoreRuleModal">&times;</span></div><div id="ignoreRuleListContainer" style="max-height:250px; overflow:auto; border:1px solid #dee2e6; border-radius:8px; padding:8px;"></div><div class="inline-form"><input type="text" id="newIgnoreKeyword" placeholder="关键词"><button id="addIgnoreKeywordBtn" style="background:#28a745;">➕ 添加</button></div><div class="flex-row" style="margin-top:16px; justify-content:space-between;"><button id="resetDefaultIgnoreRulesBtn" class="secondary">重置推荐</button><button id="clearAllIgnoreRulesBtn" class="reset-btn">清空</button></div></div></div>
    <div id="templateModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>管理模板</h3><span class="close" id="closeTemplateModal">&times;</span></div><button id="modalAddTemplateBtn">➕ 新增模板</button><div id="templateList"></div></div></div>
    <div id="scriptEditModal" class="modal"><div class="modal-content" style="max-width:600px;"><div class="modal-header"><h3 id="scriptEditTitle">编辑话术</h3><span class="close" id="closeScriptModal">&times;</span></div><textarea id="scriptEditText" rows="4" style="width:100%; margin-bottom:12px;"></textarea><label>标签（可多个，用逗号或空格分隔）</label><input type="text" id="scriptEditTags" placeholder="例如：常用,补偿,活动" style="width:100%; margin-bottom:12px;"><div class="flex-row"><button id="saveScriptBtn">💾 保存</button><button id="cancelScriptBtn" class="secondary">取消</button></div></div></div>
    <div id="batchTagModal" class="modal"><div class="modal-content" style="max-width:500px;"><div class="modal-header"><h3>批量添加标签</h3><span class="close" id="closeBatchModal">&times;</span></div><input type="text" id="batchTagInput" placeholder="标签名（逗号分隔）" style="width:100%; margin-bottom:12px;"><div class="flex-row"><button id="applyBatchTagBtn">应用</button><button id="cancelBatchBtn" class="secondary">取消</button></div></div></div>
    <div id="manageTagsModal" class="modal"><div class="modal-content" style="max-width:500px;"><div class="modal-header"><h3>管理所有标签</h3><span class="close" id="closeManageTags">&times;</span></div><div id="allTagsList" style="margin-bottom:16px;"></div><div class="flex-row"><input type="text" id="newTagInput" placeholder="新标签名" style="flex:1;"><button id="addNewTagBtn">➕ 添加</button></div></div></div>
    <div id="importScriptModal" class="modal"><div class="modal-content" style="max-width:500px;"><div class="modal-header"><h3>导入话术文本</h3><span class="close" id="closeImportModal">&times;</span></div><div class="checkbox-label"><input type="checkbox" id="skipDuplicateCheckbox" checked> 跳过重复</div><input type="file" id="importFileInput" accept=".txt,.csv" /><div class="flex-row" style="margin-top:12px;"><button id="confirmImportBtn">开始导入</button><button id="cancelImportBtn" class="secondary">取消</button></div><div id="importProgress" style="margin-top:8px; font-size:12px; color:#0d6efd;"></div></div></div>

    <script>
        (async function () {
            "use strict";
            const SERVER_URL = window.location.origin;
            const CORE_FIELDS = ['时间', '体力', '红钻', '金币'];
            const DEFAULT_TEMPLATES = ["查询到您在{时间}{action}{体力}点体力", "查询到您在{时间}{action}{红钻}红钻", "查询到您在{时间}{action}{金币}金币"];
            const DEFAULT_SOURCE_RULES = [
                { pattern: "金币竞赛", replacement: "茶楼大战", type: "source" },
                { pattern: "体力购买", replacement: "购买体力", type: "source" },
                { pattern: "装扮活动", replacement: "装扮活动兑换", type: "source" },
                { pattern: "商店购买", replacement: "在商店购买", type: "source" },
                { pattern: "任务", replacement: "任务奖励", type: "source" },
                { pattern: ":", replacement: "：", type: "reward" },
                { pattern: "猪肉", replacement: "副棋盘活动道具", type: "chessName" },
                { pattern: "棋盘操作-使用消耗棋子", replacement: "点击棋子", type: "source" }
            ];
            const DEFAULT_IGNORE_KEYWORDS = ["棋盘上传"];
            const PACK_NAME_MAP = { 151: "1星百戏锦囊", 152: "1星大百戏锦囊", 153: "2星百戏锦囊", 154: "2星大百戏锦囊", 155: "3星百戏锦囊", 156: "3星大百戏锦囊", 157: "4星百戏锦囊", 158: "4星大百戏锦囊", 159: "5星百戏锦囊", 160: "5星大百戏锦囊", 161: "5星超大百戏锦囊" };

            // 云端同步
            async function loadData(key, defaultValue) {
                try {
                    const resp = await fetch(`${SERVER_URL}/api/data/${key}`);
                    if (resp.ok) {
                        const { value } = await resp.json();
                        if (value !== undefined) {
                            localStorage.setItem(key, JSON.stringify(value));
                            return value;
                        }
                    }
                    localStorage.removeItem(key);
                    throw new Error('服务器无数据');
                } catch {
                    const cached = localStorage.getItem(key);
                    return cached ? JSON.parse(cached) : defaultValue;
                }
            }
            async function saveData(key, data) {
                localStorage.setItem(key, JSON.stringify(data));
                try {
                    await fetch(`${SERVER_URL}/api/data/${key}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ value: data })
                    });
                } catch (e) { console.warn('同步云端失败', e); }
            }

            let templates = await loadData('templates', DEFAULT_TEMPLATES);
            let scripts = await loadData('scripts', []);
            let sourceRules = await loadData('sourceRules', DEFAULT_SOURCE_RULES);
            let ignoreKeywords = await loadData('ignoreKeywords', DEFAULT_IGNORE_KEYWORDS);
            (function migrate() { for (let i = 0; i < scripts.length; i++) if (typeof scripts[i] === 'string') scripts[i] = { text: scripts[i], tags: [] }; saveData('scripts', scripts); })();

            // 工具函数
            function getRulePattern(r) { return r.pattern || ''; }
            function getRuleReplacement(r) { return r.replacement || ''; }
            const templateSelect = document.getElementById('templateSelect');
            const varContainer = document.getElementById('varContainer');
            const globalResultArea = document.getElementById('globalResultArea');
            const globalResultCount = document.getElementById('globalResultCount');
            const resultSourceHint = document.getElementById('resultSourceHint');
            const debugConsole = document.getElementById('flowDebugConsole');
            const smartPasteInput = document.getElementById('smartPasteInput');
            let varInputs = {};

            function expandDebugConsole() { debugConsole.style.display = 'block'; }
            document.getElementById('debugToggleHeader')?.addEventListener('click', expandDebugConsole);
            function cleanText(t) { return t.replace(/\ufeff/g, '').replace(/\s+/g, ' ').trim(); }
            function extractTime(t) {
                const p = [/(\d{4}[-\/]\d{1,2}[-\/]\d{1,2}\s+\d{1,2}:\d{1,2}(:\d{1,2})?)/, /(\d{2}\/\d{1,2}\/\d{4}\s+\d{1,2}:\d{1,2}(:\d{1,2})?)/];
                for (let r of p) { const m = t.match(r); if (m) return m[1]; } return null;
            }
            function formatTimeToStandard(timeStr) {
                if (!timeStr) return '';
                let s = timeStr.replace(/\//g, '-');
                let m = s.match(/(\d{4})-(\d{1,2})-(\d{1,2})\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?/);
                if (!m) return s;
                return `${m[1]}-${m[2].padStart(2, '0')}-${m[3].padStart(2, '0')} ${m[4].padStart(2, '0')}:${m[5].padStart(2, '0')}:${(m[6] || '00').padStart(2, '0')}`;
            }
            function detectResourceType(line) { if (line.includes('体力')) return '体力'; if (line.includes('红钻')) return '红钻'; if (line.includes('金币')) return '金币'; return '道具'; }
            function applyConversionByType(src, type) {
                if (!src) return src;
                if (!(document.getElementById('enableSourceConversionCheckbox')?.checked ?? true)) return src;
                const lower = src.toLowerCase();
                for (let r of sourceRules.filter(r => r.type === type)) if (r.pattern && lower.includes(r.pattern.toLowerCase())) return r.replacement || src;
                return src;
            }
            function applySourceConversion(src) { return applyConversionByType(src, 'source'); }
            function applyRewardConversion(str) {
                if (!str) return str;
                if (!(document.getElementById('enableSourceConversionCheckbox')?.checked ?? true)) return str;
                let result = str;
                for (let r of sourceRules.filter(r => r.type === 'reward')) {
                    if (!r.pattern) continue;
                    result = result.replace(new RegExp(r.pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), r.replacement || '');
                }
                return result.replace(/\s+/g, ' ').trim();
            }
            function shouldIgnoreLine(line) {
                if (!(document.getElementById('enableIgnoreRulesCheckbox')?.checked ?? true) || !ignoreKeywords.length) return false;
                return ignoreKeywords.some(kw => line.toLowerCase().includes(kw.toLowerCase()));
            }
            function cleanHeader(s) { return s.trim().replace(/^["'“”]|["'“”]$/g, ''); }

            // 资源点击替换规则
            function applyResourceClickReplace(text, resourceType) {
                if (!text) return text;
                const map = { '体力': '点击葫芦', '红钻': '点击红钻堆', '金币': '点击金币堆' };
                const replacement = map[resourceType];
                if (!replacement) return text;
                return text.replace(/点击棋子/g, replacement);
            }

            // 资源流水解析
            function parseSmartLog(rawText) {
                const lines = rawText.split(/\r?\n/).filter(l => l.trim());
                const records = [];
                for (let line of lines) {
                    if (shouldIgnoreLine(line)) continue;
                    const rawTime = extractTime(line); if (!rawTime) continue;
                    const time = formatTimeToStandard(rawTime);
                    const parts = line.split('\t'); if (parts.length < 6) continue;
                    const thirdCol = parts[2]?.trim();
                    const isFormatB = /^[+-]?\d+$/.test(thirdCol);
                    let changeRaw, beforeRaw, afterRaw, sourceRaw, itemName = '';
                    if (isFormatB) { changeRaw = parts[2]; beforeRaw = parts[3]; afterRaw = parts[4]; sourceRaw = parts[5]; itemName = (parts.length >= 8 && parts[7]?.includes('棋子')) ? parts[7]?.trim() : ''; }
                    else { changeRaw = parts[3]; beforeRaw = parts[4]; afterRaw = parts[5]; sourceRaw = parts[6]; itemName = (parts.length >= 9 && parts[8]?.includes('棋子')) ? parts[8]?.trim() : ''; }
                    const change = parseInt(changeRaw, 10); if (isNaN(change)) continue;
                    let before = parseFloat(beforeRaw) || 0, after = parseFloat(afterRaw) || 0;
                    sourceRaw = (sourceRaw || '').trim().replace(/^["']|["']$/g, '');
                    const source = applySourceConversion(sourceRaw);
                    records.push({ '时间': time, '数量': change, '来源': source, '道具名称': itemName, '之前': before, '之后': after });
                }
                records.sort((a, b) => (b['时间'] || '').localeCompare(a['时间'] || ''));
                return records;
            }

            function getChangeAndAction(rec) {
                let before = parseFloat(rec['之前']) || 0, after = parseFloat(rec['之后']) || 0, change = after - before;
                if (change === 0) change = parseFloat(rec['数量']) || 0;
                const action = change > 0 ? '获得' : (change < 0 ? '消耗' : '');
                return { change, action, before, after };
            }

            function isActivityItem(itemName, source, resourceType) {
                if (resourceType !== '道具') return false;
                return ['活动道具', '活动'].some(kw => (itemName + ' ' + source).toLowerCase().includes(kw.toLowerCase()));
            }

            function generateFlowSentence(rec, type, showChange = true) {
                const time = (rec['时间'] || '').replace(/-/g, '/');
                const source = rec['来源'] || '';
                const itemName = rec['道具名称'] || '';
                const { change, action, before, after } = getChangeAndAction(rec);
                if (!change || !action) return null;
                const abs = Math.abs(change);

                // 活动道具的特殊话术
                if (isActivityItem(itemName, source, type))
                    return `在${time}，${action}了${abs}个${itemName || '活动道具'}`;

                // 道具类话术（当道具名包含“积分”或“券”时，显示前后变化）
                if (type === '道具' && itemName) {
                    if (itemName.includes('积分') || itemName.includes('券')) {
                        return source
                            ? `在${time}，通过【${source}】${action}${abs}个${itemName}，从${before}变为${after}`
                            : `在${time}，${action}${abs}个${itemName}，从${before}变为${after}`;
                    }
                    return `在${time}，${action}了${abs}个${itemName}`;
                }

                // 资源类话术（体力/红钻/金币等）
                let sentence = showChange
                    ? (source ? `在${time}，通过【${source}】${action}${abs}点${type}，从${before}变为${after}`
                        : `在${time}，${action}${abs}点${type}，从${before}变为${after}`)
                    : (source ? `在${time}，通过【${source}】${action}${abs}点${type}`
                        : `在${time}，${action}${abs}点${type}`);
                return applyResourceClickReplace(sentence, type);
            }

            // 订单日志解析
            function parseOrderLog(rawText) {
                let text = rawText.replace(/\r\n/g, '\n').replace(/\n/g, ' ');
                const parts = text.split('\t').map(p => p.trim());
                if (parts.length < 8) { debugConsole.innerHTML += '\n❌ 订单日志字段不足'; return []; }
                const fullText = rawText.toLowerCase();
                const orderType = parts[3] || '未知订单';
                const firstTime = extractTime(rawText) || '';
                if (fullText.includes('过期')) return [`${orderType}已在${firstTime}过期`];

                let statusIdx = -1, statusText = '', finalTime = '';
                for (let i = 0; i < parts.length; i++) {
                    if (['完成', '删除', '创建'].includes(parts[i])) {
                        statusIdx = i; statusText = parts[i];
                        if (i + 1 < parts.length) finalTime = parts[i + 1];
                        break;
                    }
                }
                if (statusIdx === -1 || !finalTime) {
                    const timeMatches = rawText.match(/(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})/g);
                    if (timeMatches) finalTime = timeMatches[timeMatches.length - 1];
                    statusText = '操作';
                }

                let chessStartIdx = 5;
                if (parts[chessStartIdx] === '是') chessStartIdx = 6;
                let chessNames = [], fiveDigitFound = false;
                for (let i = chessStartIdx; i < parts.length; i++) {
                    const segment = parts[i];
                    const fiveDigitMatch = segment.match(/\b\d{5}\b/);
                    if (fiveDigitMatch) {
                        const beforeFive = segment.substring(0, segment.indexOf(fiveDigitMatch[0]));
                        const chineseMatches = beforeFive.match(/[\u4e00-\u9fa5]+/g);
                        if (chineseMatches) chessNames.push(...chineseMatches);
                        fiveDigitFound = true; break;
                    } else {
                        const chinese = segment.match(/[\u4e00-\u9fa5]+/g);
                        if (chinese) chessNames.push(...chinese);
                    }
                }
                const chessStr = chessNames.length ? chessNames.join('、') : '棋子';

                let rewardRaw = '';
                if (fiveDigitFound) {
                    let fiveIdxInRaw = -1;
                    for (let i = chessStartIdx; i < parts.length; i++) if (/\b\d{5}\b/.test(parts[i])) { fiveIdxInRaw = i; break; }
                    if (fiveIdxInRaw !== -1) {
                        const beforeReward = parts.slice(0, fiveIdxInRaw + 3).join('\t');
                        const rewardStartPos = beforeReward.length + (fiveIdxInRaw > 0 ? 1 : 0);
                        const statusPos = rawText.indexOf(statusText);
                        const rewardEndPos = (statusIdx !== -1) ? statusPos : rawText.lastIndexOf(finalTime);
                        if (rewardEndPos > rewardStartPos) rewardRaw = rawText.substring(rewardStartPos, rewardEndPos);
                    }
                } else {
                    const endPos = statusIdx !== -1 ? parts.slice(0, statusIdx).join('\t').length : rawText.lastIndexOf(finalTime);
                    rewardRaw = rawText.substring(0, endPos);
                }

                // 关键修复：移除所有时间戳，但保留换行以便分行解析
                rewardRaw = rewardRaw.replace(/\t/g, ' ').replace(/\d{4}-\d{2}-\d{2}\s+\d{1,2}:\d{2}:\d{2}/g, '').trim();
                rewardRaw = applyRewardConversion(rewardRaw);

                // 现在按换行拆分行（因为日志中奖励物品每行一个）
                const lines = rewardRaw.split(/\n/).map(l => l.trim()).filter(l => l.length > 0);
                const rewardItems = [];
                let pendingItem = null;
                for (let line of lines) {
                    if (/^\d+$/.test(line)) continue;
                    const numMatch = line.match(/(?:[:：]\s*)?(\d+)\s*$/);
                    let itemDesc = line;
                    let count = null;
                    if (numMatch) {
                        count = numMatch[1];
                        itemDesc = line.substring(0, numMatch.index).trim();
                        itemDesc = itemDesc.replace(/[:：]\s*$/, '').trim();
                    }
                    if (itemDesc) {
                        if (pendingItem) {
                            if (count !== null) {
                                rewardItems.push(`${pendingItem} ${itemDesc}:${count}`.replace(/\s+/g, ' ').trim());
                                pendingItem = null;
                            } else {
                                rewardItems.push(pendingItem);
                                pendingItem = itemDesc;
                            }
                        } else {
                            if (count !== null) rewardItems.push(`${itemDesc}:${count}`);
                            else pendingItem = itemDesc;
                        }
                    } else if (count !== null && pendingItem) {
                        rewardItems.push(`${pendingItem}:${count}`);
                        pendingItem = null;
                    }
                }
                if (pendingItem) rewardItems.push(pendingItem);

                let finalRewardItems = rewardItems.map(item => {
                    item = item.replace(/\s+/g, ' ').trim();
                    item = item.replace(/\s*:\s*/g, ':');
                    return item;
                }).filter(item => item.length > 0);
                finalRewardItems = [...new Set(finalRewardItems)];

                // 最终用中文逗号连接
                const rewardStr = finalRewardItems.length ? finalRewardItems.join('，') : '奖励';
                const actionVerb = statusText === '完成' ? '完成订单' : (statusText === '删除' ? '删除订单' : '操作订单');
                return [`在${finalTime.replace(/-/g, '/')}提交【${chessStr}】${actionVerb}，获得${rewardStr}`];
            }

            // 棋子流水解析（增强版）
            function parseChessLog(raw) {
                const lines = raw.split(/\r?\n/).filter(l => l.trim());
                const events = []; let cur = null;
                const tsRgx = /^\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}/;
                for (let l of lines) {
                    if (!l.trim()) continue;
                    if (tsRgx.test(l)) { if (cur) events.push(cur); cur = l; }
                    else if (cur) cur += '\n' + l;
                }
                if (cur) events.push(cur);

                return events.map(ev => {
                    try {
                        const parts = ev.split('\t');
                        if (parts.length < 6) throw new Error('字段不足');
                        const time = formatTimeToStandard(parts[0].trim());
                        if (!time) throw new Error('时间错误');

                        const chessRaw = (parts[2] || '').trim();
                        let name = '棋子', level = 0;
                        if (chessRaw.includes('/')) {
                            const [id, nm] = chessRaw.split('/');
                            name = nm || chessRaw;
                            const lm = id.match(/(\d{2})$/);
                            if (lm) { level = parseInt(lm[1], 10); if (isNaN(level)) level = 0; }
                        } else name = chessRaw;

                        const change = parseInt(parts[3] || '0', 10) || 0;
                        let cmd = '';
                        for (let i = 6; i < parts.length; i++) {
                            const p = parts[i].trim();
                            if (p.includes('棋盘操作-')) { cmd = p; break; }
                        }
                        if (!cmd) cmd = (parts[7] || parts[8] || '').trim();
                        if (!cmd) throw new Error('未找到命令');

                        let desc = '';
                        if (cmd.includes('钻石解锁泡泡')) desc = `使用红钻解锁泡泡获得${level ? level + '级' : ''}${name}`;
                        else if (cmd.includes('广告解锁泡泡')) desc = `看广告解锁泡泡获得${level ? level + '级' : ''}${name}`;
                        else if (cmd.includes('活动棋盘仓库推出')) desc = `从活动棋盘的临时队列中取出${level ? level + '级' : ''}${name}`;
                        else if (cmd.includes('推出栈')) desc = `从临时队列取出${level ? level + '级' : ''}${name}`;
                        else if (cmd.includes('推入仓库')) desc = `将${level ? level + '级' : ''}${name}放入仓库`;
                        else if (cmd.includes('推出仓库')) desc = `从仓库取出${level ? level + '级' : ''}${name}`;
                        else if (cmd.includes('临时队列取出')) desc = `从临时队列取出${level ? level + '级' : ''}${name}`;
                        else if (cmd.includes('商店购买')) desc = `在商店购买了${Math.abs(change)}个${level ? level + '级' : ''}${name}`;
                        else if (cmd.includes('合并')) desc = change > 0 ? `通过合并获得${Math.abs(change)}个${level ? level + '级' : ''}${name}` : `消耗${Math.abs(change)}个${level ? level + '级' : ''}${name}进行合成`;
                        else if (cmd.includes('活动')) desc = `通过活动获得${Math.abs(change)}个${level ? level + '级' : ''}${name}`;
                        else if (cmd.includes('使用消耗棋子')) desc = `消耗${Math.abs(change)}个${level ? level + '级' : ''}${name}`;
                        else if (cmd.includes('删除')) desc = `删除了${Math.abs(change)}个${level ? level + '级' : ''}${name}`;
                        else if (change !== 0) desc = change > 0 ? `获得${Math.abs(change)}个${level ? level + '级' : ''}${name}` : `消耗${Math.abs(change)}个${level ? level + '级' : ''}${name}`;
                        else throw new Error('无法识别命令');

                        return { finalDesc: `在${time} ${desc}`, time };
                    } catch (e) { return { error: e.message }; }
                });
            }

            function smartParseAndFill() {
                expandDebugConsole();
                const mode = document.querySelector('input[name="parseMode"]:checked').value;
                const raw = smartPasteInput.value.trim();
                if (!raw) { debugConsole.innerHTML = '❌ 请输入文本'; return; }

                if (mode === 'order') {
                    if (raw.includes('创建')) {
                        alert('抱歉呢宝宝，俺只认得“完成”和“过期”的订单咧，看看是不是复制了“创建”的捏⩌⤚⩌)');
                        globalResultArea.value = '';
                        globalResultCount.textContent = '0 条';
                        resultSourceHint.textContent = '订单日志（包含“创建”，未解析）';
                        return;
                    }
                    debugConsole.innerHTML = '📦 订单日志解析...';
                    const s = parseOrderLog(raw);
                    globalResultArea.value = s.join('\n\n');
                    globalResultCount.textContent = `${s.length} 条`;
                    resultSourceHint.textContent = '订单日志解析';
                    navigator.clipboard.writeText(globalResultArea.value);
                    debugConsole.innerHTML += `\n✅ 完成`; return;
                }

                if (mode === 'chess') {
                    debugConsole.innerHTML = '🔍 棋子流水解析...';
                    const r = parseChessLog(raw).filter(r => !r.error);
                    if (!r.length) { debugConsole.innerHTML += '\n❌ 没有解析到有效棋子记录'; return; }
                    r.sort((a, b) => (b.time || '').localeCompare(a.time || ''));
                    const out = r.map(r => r.finalDesc).join('\n\n');
                    globalResultArea.value = out;
                    globalResultCount.textContent = `${r.length} 条`;
                    resultSourceHint.textContent = '棋子流水解析';
                    navigator.clipboard.writeText(out);
                    debugConsole.innerHTML += `\n✅ 完成`; return;
                }

                debugConsole.innerHTML = '🔍 资源流水解析...';
                const resourceType = document.getElementById('flowResourceSelect').value;
                const includeSourcesRaw = document.getElementById('includeSourcesInput').value.trim();
                const itemKeywordRaw = document.getElementById('itemKeywordInput').value.trim();
                let records = parseSmartLog(raw);
                if (!records.length) { debugConsole.innerHTML += '\n❌ 无记录'; return; }
                debugConsole.innerHTML += `\n📌 原始记录数: ${records.length}`;

                // 道具关键词筛选
                if (resourceType === '道具' && itemKeywordRaw) {
                    const keywords = itemKeywordRaw.split(',').map(k => k.trim().toLowerCase()).filter(k => k);
                    debugConsole.innerHTML += `\n🔍 应用道具关键词: ${keywords.join(', ')}`;
                    records = records.filter(r => {
                        const itemName = (r['道具名称'] || '').toLowerCase();
                        return keywords.some(k => itemName.includes(k));
                    });
                    debugConsole.innerHTML += `\n📌 道具筛选后: ${records.length} 条`;
                }
                // 来源关键词筛选
                if (includeSourcesRaw) {
                    const keywords = includeSourcesRaw.split(',').map(k => k.trim().toLowerCase()).filter(k => k);
                    debugConsole.innerHTML += `\n🔍 应用来源关键词: ${keywords.join(', ')}`;
                    records = records.filter(r => {
                        const source = (r['来源'] || '').toLowerCase();
                        return keywords.some(k => source.includes(k));
                    });
                    debugConsole.innerHTML += `\n📌 来源筛选后: ${records.length} 条`;
                }

                if (records.length === 0) { debugConsole.innerHTML += '\n⚠️ 筛选后无话术'; return; }
                let sentences = records.map(r => generateFlowSentence(r, resourceType, false)).filter(s => s);
                if (sentences.length === 0) { debugConsole.innerHTML += '\n⚠️ 无有效话术'; return; }
                globalResultArea.value = sentences.join('\n\n');
                globalResultCount.textContent = `${sentences.length} 条`;
                resultSourceHint.textContent = '智能解析（已应用资源替换）';
                navigator.clipboard.writeText(globalResultArea.value);
                debugConsole.innerHTML += `\n✨ 生成 ${sentences.length} 条`;
            }

            // CSV 解析与合并
            function parseFlowCSV(csvText) {
                const lines = csvText.split(/\r?\n/).filter(l => l.trim());
                if (lines.length < 2) return [];
                let delim = lines[0].includes('\t') ? '\t' : (lines[0].includes(';') ? ';' : ',');
                const rawHeaders = lines[0].split(delim).map(h => cleanHeader(h));
                debugConsole.innerHTML = `📋 列名: ${rawHeaders.join(' | ')}`;
                const colMap = {
                    '时间': ['创建时间', '时间', 'time'],
                    '增减': ['0:减少;1:增加', '增减', 'type'],
                    '数量': ['数量', 'change'],
                    '之前': ['数量(before)', 'before', '之前'],
                    '之后': ['数量(after)', 'after', '之后'],
                    '来源': ['来源', 'source'],
                    '道具名称': ['道具名称', '道具名', '名称', 'itemName']
                };
                const colIdx = {};
                for (let [k, arr] of Object.entries(colMap)) {
                    for (let a of arr) {
                        const idx = rawHeaders.findIndex(h => h === a);
                        if (idx !== -1) { colIdx[k] = idx; break; }
                    }
                }
                if (colIdx['时间'] === undefined) colIdx['时间'] = 0;
                if (colIdx['增减'] === undefined) colIdx['增减'] = 2;
                if (colIdx['数量'] === undefined) colIdx['数量'] = 3;
                if (colIdx['之前'] === undefined) colIdx['之前'] = 4;
                if (colIdx['之后'] === undefined) colIdx['之后'] = 5;
                if (colIdx['来源'] === undefined) colIdx['来源'] = 6;
                if (colIdx['道具名称'] === undefined) colIdx['道具名称'] = -1;

                const records = [];
                const enableIgnore = document.getElementById('enableIgnoreRulesCheckbox')?.checked ?? true;
                for (let i = 1; i < lines.length; i++) {
                    let line = lines[i];
                    const vals = []; let cur = '', inq = false;
                    for (let ch of line) {
                        if (ch === '"') inq = !inq;
                        else if (ch === delim && !inq) { vals.push(cur.trim()); cur = ''; }
                        else cur += ch;
                    }
                    vals.push(cur.trim());
                    const cleanVals = vals.map(v => v.replace(/^["']|["']$/g, ''));
                    if (cleanVals.length <= Math.max(...Object.values(colIdx))) continue;

                    const rec = {
                        '时间': formatTimeToStandard(cleanVals[colIdx['时间']] || ''),
                        '增减': cleanVals[colIdx['增减']] || '',
                        '数量': cleanVals[colIdx['数量']] || '0',
                        '之前': cleanVals[colIdx['之前']] || '0',
                        '之后': cleanVals[colIdx['之后']] || '0',
                        '来源': cleanVals[colIdx['来源']] || '',
                        '道具名称': colIdx['道具名称'] >= 0 ? cleanVals[colIdx['道具名称']] : ''
                    };
                    rec['资源类型'] = detectResourceType(line);
                    if (enableIgnore && ignoreKeywords.length) {
                        const src = rec['来源'].toLowerCase(), item = rec['道具名称'].toLowerCase();
                        if (ignoreKeywords.some(k => src.includes(k.toLowerCase()) || item.includes(k.toLowerCase()))) {
                            debugConsole.innerHTML += `\n⏭️ 行${i + 1} 忽略`; continue;
                        }
                    }
                    rec['来源'] = applySourceConversion(rec['来源']);
                    const { change, action } = getChangeAndAction(rec);
                    if (!action) continue;
                    rec['行为'] = action;
                    rec['变化量'] = change;
                    records.push(rec);
                    debugConsole.innerHTML += `\n📌 行${i + 1}: 道具=${rec['道具名称']}, 变化=${change}, 行为=${action}`;
                }
                records.sort((a, b) => (b['时间'] || '').localeCompare(a['时间'] || ''));
                return records;
            }

            function buildMergedRewardText(records) {
                const groupMap = new Map();
                for (let rec of records) {
                    const action = rec['行为']; if (!action) continue;
                    const itemName = (rec['道具名称'] || '').trim(); if (!itemName) continue;
                    const rawTime = rec['时间'];
                    const source = rec['来源'] || '未知来源';
                    const timeKey = formatTimeToStandard(rawTime);
                    const groupKey = `${timeKey}|||${source}|||${action}`;
                    if (!groupMap.has(groupKey)) groupMap.set(groupKey, { time: timeKey, source: source, action: action, items: new Map() });
                    const group = groupMap.get(groupKey);
                    const qty = Math.abs(rec['变化量'] || 0); if (qty <= 0) continue;
                    const current = group.items.get(itemName) || 0;
                    group.items.set(itemName, current + qty);
                }
                if (groupMap.size === 0) return null;
                const sortedGroups = Array.from(groupMap.values()).sort(
                    (a, b) => b.time.localeCompare(a.time) || a.source.localeCompare(b.source) || a.action.localeCompare(b.action)
                );
                const blocks = [];
                for (let g of sortedGroups) {
                    if (g.items.size === 0) continue;
                    const sortedItems = Array.from(g.items.entries()).sort((a, b) => a[0].localeCompare(b[0]));
                    const rewardPart = sortedItems.map(([name, qty]) => `${name}*${qty}`).join('，');
                    blocks.push(`${g.time}，通过【${g.source}】正常${g.action}以下物品：${rewardPart}`);
                }
                return blocks.join('\n\n');
            }

            // 集卡功能
            let currentCardRecords = [];
            function parseCSVEnhanced(csvText) {
                const lines = csvText.split(/\r?\n/).filter(l => l.trim());
                if (lines.length < 2) return [];
                let delim = lines[0].includes('\t') ? '\t' : (lines[0].includes(';') ? ';' : ',');
                let headers = lines[0].split(delim).map(h => h.trim().replace(/^"|"$/g, ''));
                const colMap = { '卡包ID': ['卡包ID', 'pack_id'], '卡包星级': ['卡包星级', 'stars'], 'after': ['after'], '创建时间': ['创建时间', 'time'] };
                const idx = {}; for (let [k, arr] of Object.entries(colMap)) for (let n of arr) { let i = headers.findIndex(h => h === n); if (i !== -1) { idx[k] = i; break; } }
                const records = [];
                for (let i = 1; i < lines.length; i++) {
                    let line = lines[i]; const vals = [];
                    let cur = '', inq = false;
                    for (let ch of line) { if (ch === '"') inq = !inq; else if (ch === delim && !inq) { vals.push(cur.trim().replace(/^"|"$/g, '')); cur = ''; } else cur += ch; }
                    vals.push(cur.trim().replace(/^"|"$/g, ''));
                    if (vals.length > Math.max(...Object.values(idx))) records.push({ '卡包ID': vals[idx['卡包ID']], '卡包星级': vals[idx['卡包星级']], 'after': vals[idx['after']], '创建时间': vals[idx['创建时间']] });
                }
                return records;
            }
            function parseStarsArray(starsStr) { try { return JSON.parse(starsStr); } catch { const m = starsStr.match(/\[(.*)\]/); return m ? m[1].split(',').map(s => parseInt(s.trim(), 10)) : []; } }
            function parseAfter(afterStr) { try { return JSON.parse(afterStr); } catch { const m = afterStr.replace(/"/g, '').match(/\{(.*)\}/); if (!m) return {}; const res = {}; m[1].split(',').forEach(p => { const [k, v] = p.split(':'); if (k) res[k.trim()] = parseInt(v, 10); }); return res; } }
            function generateCardSentence(record) {
                const packId = parseInt(record["卡包ID"]); const packName = PACK_NAME_MAP[packId] || "未知卡包";
                const starsArray = parseStarsArray(record["卡包星级"]); const afterData = parseAfter(record["after"]);
                const cardIds = Object.keys(afterData); const descs = [];
                cardIds.forEach((cid, idx) => { const group = cid.substring(3, 5); const num = cid.substring(5, 7); const star = starsArray[idx] || 0; descs.push(`${group}组第${num}张（${star}星，${afterData[cid] === 1 ? '新卡' : '重复'}）`); });
                return `在${record["创建时间"].replace(/-/g, '/')}，开启【${packName}】获得${cardIds.length}张卡牌，分别为${descs.join('，')}`;
            }
            function filterRecordsByStar(records, star) { if (star === 'all') return records; const target = parseInt(star); return records.filter(r => parseStarsArray(r["卡包星级"]).includes(target)); }
            async function processCardCsv() {

                searchInput.oninput = () => { clearSearch.style.display = searchInput.value ? 'inline' : 'none'; renderSourceRuleList(typeFilter.value, searchInput.value); };
                clearSearch.onclick = () => { searchInput.value = ''; clearSearch.style.display = 'none'; renderSourceRuleList(typeFilter.value, ''); };
                searchInput.onkeypress = (e) => { if (e.key === 'Enter') scrollToFirstMatch(); };

                refreshVarEntries(); refreshTemplateSelect(); refreshScriptList(); renderTagFilter();
            }

            // 启动
            bindAll();
            new Sortable(document.getElementById('tabsContainer'), { animation: 150 });
            debugConsole.style.display = 'none';
            debugConsole.innerHTML = '🟢 工作台就绪 · 完整功能正常';
        })();
    </script>
